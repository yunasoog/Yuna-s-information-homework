<body class="bg-gradient-to-b from-yellow-50 via-amber-50/30 to-orange-50 text-slate-800 min-h-screen flex flex-col justify-between">

  <!-- --- 상단 헤더 --- -->
  <header class="bg-white/95 border-b border-yellow-200 shadow-sm px-5 py-4 flex items-center justify-between sticky top-0 z-50">
    <button onclick="resetApp()" class="flex items-center gap-2 font-black text-amber-500 hover:scale-105 transition-all text-xl logo-font">
      <span>오늘 뭐 먹지?</span>
    </button>
    <div class="flex gap-2">
      <!-- index.html 자체 다운로드 -->
      <button onclick="downloadThisFile()" class="text-xs bg-amber-400 hover:bg-amber-500 text-slate-900 font-bold px-3 py-2 rounded-xl shadow-sm transition-all flex items-center gap-1">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        <span>다운로드 받기 💾</span>
      </button>
      <div id="header-action-container"></div>
    </div>
  </header>

  <!-- --- 메인 뷰포트 --- -->
  <main class="flex-1 max-w-md w-full mx-auto px-4 py-6 flex flex-col justify-center">

    <!-- SCREEN 1: 메인 메뉴 -->
    <div id="screen-main" class="space-y-8 py-4 text-center">
      <!-- 계란 노른자빛 버블 타이틀 -->
      <div class="flex flex-col items-center justify-center">
        <div class="px-8 py-6 rounded-[2.5rem] border-4 border-yellow-300 bg-yellow-100/90 shadow-md">
          <span class="text-4xl font-extrabold text-amber-600 tracking-tight block">
            오늘 뭐 먹지?
          </span>
          <span class="text-xs text-amber-800/80 font-bold mt-1.5 block">
            나의 맞춤 음식 찾기 도우미
          </span>
        </div>
      </div>

      <!-- 선택 영역 -->
      <div class="space-y-4">
        <!-- 1. 식습관 테스트 -->
        <button onclick="startTest()" class="w-full bg-white hover:bg-yellow-50/40 border-2 border-yellow-200 hover:border-yellow-400 p-5 rounded-2xl flex items-center justify-between text-left shadow-sm hover:shadow-md transition-all group">
          <div class="flex items-center gap-4">
            <div class="p-3 bg-yellow-100 text-amber-600 rounded-xl group-hover:scale-105 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <div>
              <div class="font-extrabold text-slate-800 text-base">식습관 테스트</div>
              <p class="text-xs text-slate-500 mt-1">15가지 간단 질문으로 평소 성향 분석</p>
            </div>
          </div>
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
        </button>

        <!-- 2. 이게 땡긴다 고르기 -->
        <button onclick="startCraving()" class="w-full bg-white hover:bg-yellow-50/40 border-2 border-yellow-200 hover:border-yellow-400 p-5 rounded-2xl flex items-center justify-between text-left shadow-sm hover:shadow-md transition-all group">
          <div class="flex items-center gap-4">
            <div class="p-3 bg-yellow-100 text-amber-600 rounded-xl group-hover:scale-105 transition">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg>
            </div>
            <div>
              <div class="font-extrabold text-slate-800 text-base">이게 땡긴다 고르기</div>
              <p class="text-xs text-slate-500 mt-1">밥, 면, 예산, 카테고리 지정 필터</p>
            </div>
          </div>
          <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>

    // 로컬 스토리지 데이터 적용
    function applySavedCustomImages() {
      let customs = {};
      try {
        customs = JSON.parse(localStorage.getItem('custom_food_images')) || {};
      } catch(e) {}
      Object.keys(customs).forEach(id => {
        const idx = FOOD_DATABASE.findIndex(f => f.id === id);
        if(idx > -1) {
          FOOD_DATABASE[idx].img = customs[id];
        }
      });
    }

    // --- 화면 제어 전환 함수 ---
    function goToScreen(screenId) {
      document.getElementById('screen-main').classList.add('hidden');
      document.getElementById('screen-test').classList.add('hidden');
      document.getElementById('screen-craving').classList.add('hidden');
      document.getElementById('screen-dislike').classList.add('hidden');
      document.getElementById('screen-result').classList.add('hidden');

      document.getElementById('screen-' + screenId).classList.remove('hidden');

      const headerAction = document.getElementById('header-action-container');
      if (screenId !== 'main' && screenId !== 'result') {
        headerAction.innerHTML = `
          <button onclick="calculateAndShowResult()" class="text-xs bg-yellow-500 hover:bg-yellow-600 text-white font-bold px-3 py-2 rounded-xl shadow-sm transition-all">
            바로 추천받기 ➔
          </button>
        `;
      } else {
        headerAction.innerHTML = '';
      }
    }

        energy: 0, spiceNeeded: 0, maxSpicy: 2, oilyPref: 1, varietyNeeded: false,
        heavyNeeded: 0, texture: 'any', energyNeeded: 0, budgetSensitive: false,
        saltNeeded: 0, brothPref: 1, speedNeeded: 0, adventure: false, coolNeeded: 0, prizeNeeded: false
      };
      renderTestQuestion();
      goToScreen('test');
    }

    function renderTestQuestion() {
      const q = HABIT_QUESTIONS[testIndex];
      document.getElementById('test-progress-text').innerText = `질문 ${testIndex + 1} / ${HABIT_QUESTIONS.length}`;
      document.getElementById('test-progress-bar').style.width = `${((testIndex + 1) / HABIT_QUESTIONS.length) * 100}%`;
      document.getElementById('test-question-text').innerText = q.text;

      const container = document.getElementById('test-options-container');
      container.innerHTML = '';

      q.options.forEach((opt, idx) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 rounded-xl bg-amber-50/20 hover:bg-yellow-50 border border-yellow-100 hover:border-yellow-400 transition-all font-semibold text-slate-700 hover:text-amber-900";
        btn.innerText = opt.text;
        btn.onclick = () => selectTestOption(opt.score);
        container.appendChild(btn);
      });
    }

    function selectTestOption(score) {
      Object.keys(score).forEach(key => {
        if (typeof score[key] === 'boolean' || typeof score[key] === 'string') {
          testScores[key] = score[key];
        } else {
          // 값 누적 중복 방지
          if (key === 'maxSpicy' || key === 'oilyPref' || key === 'brothPref' || key === 'coolNeeded') {
            testScores[key] = score[key];
          } else {
            testScores[key] = (testScores[key] || 0) + score[key];
          }
        }
      });

      if (testIndex < HABIT_QUESTIONS.length - 1) {
        testIndex++;
        renderTestQuestion();
      } else {
        goToScreen('main');
      }
    }

    // --- 이게 땡긴다 세부 옵션 지정 모듈 ---
    const filterOptions = {
      types: ['밥', '빵', '면', '떡', '기타'],
      spicy: ['매콤', '중간', '안매운거'],
      categories: ['한식', '양식', '일식', '중식', '패스트 푸드', '기타'],
      temps: ['뜨거운거', '따뜻한거', '차가운거'],
      prices: ['만원이하', '만원이상']
    };

    function startCraving() {
      renderFilterGroup('types', 'craving-types');
      renderFilterGroup('spicy', 'craving-spicy');
      renderFilterGroup('categories', 'craving-categories');
      renderFilterGroup('temps', 'craving-temps');
      renderFilterGroup('prices', 'craving-prices');
      goToScreen('craving');
    }

    function renderFilterGroup(groupKey, elementId) {
      const container = document.getElementById(elementId);
      if (!container) return;
      container.innerHTML = '';

      filterOptions[groupKey].forEach(val => {
        const btn = document.createElement('button');
        const isSelected = cravingFilters[groupKey].includes(val);

        btn.className = `px-3 py-1.5 rounded-full text-xs font-bold transition-all ${
          isSelected ? 'bg-yellow-400 text-white shadow-sm' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'
        }`;
        
        btn.innerText = (groupKey === 'prices') ? (val === '만원이하' ? '💸 만원 이하' : '💳 만원 이상') : val;
        btn.onclick = () => {
          toggleCravingFilter(groupKey, val);
          renderFilterGroup(groupKey, elementId);
        };
        container.appendChild(btn);
      });
    }

    function toggleCravingFilter(groupKey, value) {
      const idx = cravingFilters[groupKey].indexOf(value);
      if (idx > -1) {
        cravingFilters[groupKey].splice(idx, 1);
      } else {
        cravingFilters[groupKey].push(value);
      }
    }

    // --- 이건 별로다 고르기 모듈 ---
    function startDislike() {
      swipeIndex = 0;
      dislikedFoods = [];
      likedFoods = [];
      foodImageOverrides = {};
      renderDislikeCard();
      goToScreen('dislike');
    }

    function renderDislikeCard() {
      const food = FOOD_DATABASE[swipeIndex];
      document.getElementById('dislike-progress-text').innerText = `호불호 분류 (${swipeIndex + 1} / ${FOOD_DATABASE.length})`;
      
      const imgUrl = getActiveFoodImage(food);
      document.getElementById('dislike-img').src = imgUrl;

      // 대체 보기 단추 여부 제어
      const altBtn = document.getElementById('dislike-alt-btn');
      if (altBtn) {
        if (food.altImgs && food.altImgs.length > 0) {
          altBtn.classList.remove('hidden');
        } else {
          altBtn.classList.add('hidden');
        }
      }

      document.getElementById('dislike-tag').innerText = food.category;
      document.getElementById('dislike-name').innerText = food.name;
      document.getElementById('dislike-desc').innerText = `${food.spicy} 맛 / ${food.temp} / ${food.price === '만원이하' ? '만원이하' : '만원이상'}`;
      document.getElementById('custom-img-url-input').value = '';
    }

    function getActiveFoodImage(food) {
      if(!food) return '';
      const overrideIdx = foodImageOverrides[food.id];
      if (overrideIdx === undefined || overrideIdx === -1) {
        return food.img;
      }
      return food.altImgs[overrideIdx];
    }

    function nextAltImage() {
      const food = FOOD_DATABASE[swipeIndex];
      if (!food || !food.altImgs || food.altImgs.length === 0) return;

      const currentIdx = foodImageOverrides[food.id] !== undefined ? foodImageOverrides[food.id] : -1;
      const nextIdx = (currentIdx + 1) % (food.altImgs.length + 1);
      
      if (nextIdx === food.altImgs.length) {
        foodImageOverrides[food.id] = -1;
      } else {
        foodImageOverrides[food.id] = nextIdx;
      }
      renderDislikeCard();
    }

    // 수동 사진 교정 기능
    function applyCustomUrl() {
      const input = document.getElementById('custom-img-url-input');
      const url = input.value.trim();
      if(!url) return;

      const food = FOOD_DATABASE[swipeIndex];
      updateFoodImage(food.id, url);
      renderDislikeCard();
    }

    function applyResultCustomUrl() {
      const input = document.getElementById('result-custom-img-url-input');
      const url = input.value.trim();
      if(!url || !recommendedFood) return;

      updateFoodImage(recommendedFood.id, url);
      document.getElementById('result-img').src = url;
      input.value = '';
    }

    function updateFoodImage(foodId, url) {
      const idx = FOOD_DATABASE.findIndex(f => f.id === foodId);
      if(idx > -1) {
        FOOD_DATABASE[idx].img = url;
        
        let customs = {};
        try {
          customs = JSON.parse(localStorage.getItem('custom_food_images')) || {};
        } catch(e) {}
        customs[foodId] = url;
        localStorage.setItem('custom_food_images', JSON.stringify(customs));
      }
    }

    // HTML 버튼의 swipeFood('left' / 'right') 호출 훅 완벽 바인딩!
    function swipeFood(direction) {
      const food = FOOD_DATABASE[swipeIndex];
      if (direction === 'left') {
        dislikedFoods.push(food.id);
      } else {
        likedFoods.push(food.id);
      }

      if (swipeIndex < FOOD_DATABASE.length - 1) {
        swipeIndex++;
        renderDislikeCard();
      } else {
        calculateAndShowResult();
      }
    }

    // --- 최종 매칭 추천 및 AI 연동 모듈 (지능형 점수제 랭킹 추천 알고리즘) ---
    async function calculateAndShowResult() {
      goToScreen('result');
      document.getElementById('result-loading').classList.remove('hidden');
      document.getElementById('result-content').classList.add('hidden');

      // 1. 모든 후보에 대해 취향 가중치 계산
      let scoredCandidates = FOOD_DATABASE.map(food => {
        let score = 0;

        // 싫어하는 것 필터링 아웃
        if (dislikedFoods.includes(food.id)) {
          return { food, score: -99999 };
        }

        // 1-1. 한식/일식/중식 등 카테고리 일치 시 가중치 부여
        if (cravingFilters.categories.length > 0) {
          if (cravingFilters.categories.includes(food.category)) {
            score += 150;
          } else {
            score -= 50; // 어긋나는 카테고리 감점
          }
        }

        // 1-2. 밥/면/빵 등 곡물 타입 일치 시 가중치 부여
        if (cravingFilters.types.length > 0) {
          if (cravingFilters.types.includes(food.type)) {
            score += 150;
          } else {
            score -= 50; // 어긋나는 타입 감점
          }
        }

        // 1-3. 맵기 조건 일치
        if (cravingFilters.spicy.length > 0) {
          if (cravingFilters.spicy.includes(food.spicy)) {
            score += 50;
          }
        }

        // 1-4. 온도 일치
        if (cravingFilters.temps.length > 0) {
          if (cravingFilters.temps.includes(food.temp)) {
            score += 50;
          }
        }

        // 1-5. 가격 일치
        if (cravingFilters.prices.length > 0) {
          if (cravingFilters.prices.includes(food.price)) {
            score += 50;
          }
        }

        // 2. 식습관 분석 기반 스마트 보너스
        // 2-1. 맵찔이 예외 조치 (Q2. 매운 것을 전혀 못 먹는 경우 대폭 감점)
        if (testScores.maxSpicy === 1 && food.spicy === '매콤') {
          score -= 300;
        }
        // 2-2. 스트레스 매운맛 선호 보너스
        if (testScores.spiceNeeded >= 2 && food.spicy === '매콤') {
          score += 40;
        }
        // 2-3. 국물 요리 선호 보너스
        const isSoupFood = food.name.endsWith('찌개') || food.name.endsWith('국') || food.name.endsWith('탕') || food.name === '라멘' || food.name === '우동' || food.name === '마라탕' || food.name === '짬뽕';
        if (testScores.brothPref >= 2 && isSoupFood) {
          score += 30;
        }

        // 3. 이건 좋아 선호 보너스
        if (likedFoods.includes(food.id)) {
          score += 80;
        }

        return { food, score };
      });

      // 유효 후보군 선별 (dislike된 후보 제외)
      scoredCandidates = scoredCandidates.filter(item => item.score > -9000);

      // 최고 점수 계산
      let maxScore = -99999;
      scoredCandidates.forEach(item => {
        if (item.score > maxScore) {
          maxScore = item.score;
        }
      });

      // 최고점을 획득한 완벽/최선의 후보 목록 추합
      let finalPool = scoredCandidates.filter(item => item.score === maxScore).map(item => item.food);

      if (finalPool.length === 0) {
        finalPool = FOOD_DATABASE.filter(f => !dislikedFoods.includes(f.id));
        if (finalPool.length === 0) finalPool = [...FOOD_DATABASE];
      }

      // 최종 무작위 초이스
      recommendedFood = finalPool[Math.floor(Math.random() * finalPool.length)];

      // 6. 결과 출력
      document.getElementById('result-img').src = getActiveFoodImage(recommendedFood);
      document.getElementById('result-tags').innerText = `${recommendedFood.category} • ${recommendedFood.type}`;
      document.getElementById('result-name').innerText = recommendedFood.name;

      // 7. Workers 프록시 AI 한마디 분석평 연동
      const systemPrompt = `당신은 오늘의 점심과 저녁 메뉴를 조언해 주는 음식 큐레이션 AI입니다. 친근하면서 깔끔하고 따스한 어조로, 사용자가 식습관 테스트와 호불호 분류로 골라낸 이 음식을 오늘 먹으면 최고인 이유를 120자 내외로 명확하게 적어해주세요.`;
      const userPrompt = `
        추천 메뉴: ${recommendedFood.name} (${recommendedFood.category}, ${recommendedFood.type})
        사용자 성향: 컨디션 에너지(${testScores.energy}), 매운 한계치(${testScores.maxSpicy}), 선호 식감(${testScores.texture})
        위 지표들을 엮어서 다정한 한마디 추천사를 제안해 줘.
      `;

      let aiResultText = '';
      let retries = 5;
      let delay = 1000;

      while (retries > 0) {
        try {
          const response = await fetch(`https://test.dollboll90.workers.dev/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: userPrompt }] }],
              systemInstruction: { parts: [{ text: systemPrompt }] }
            })
          });

          if (!response.ok) throw new Error('API Fail');
          const data = await response.json();
          aiResultText = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
          break;
        } catch (err) {
          retries--;
          if (retries === 0) {
            const backups = [
              `오늘의 식습관 패턴 분석 결과, 자극 없이 기분 좋은 포만감을 채워줄 '${recommendedFood.name}'을(를) 추천해요. 한 그릇 든든하게 비우고 기운 충전해 보세요!`,
              `선호도와 온도 맞춤 요소를 정합해 매치한 결론은 바로 '${recommendedFood.name}'입니다. 지루함을 씻어낼 맛있는 짝꿍이 될 것입니다.`,
              `망설임 없는 선택을 도와줄 오늘의 식사는 바로 '${recommendedFood.name}'입니다. 따뜻하고 편안하게 한 끼 즐겨보세요.`
            ];
            aiResultText = backups[Math.floor(Math.random() * backups.length)];
          } else {
            await new Promise(resolve => setTimeout(resolve, delay));
            delay *= 2;
          }
        }
      }

      document.getElementById('result-ai-opinion').innerText = aiResultText.trim();
      document.getElementById('result-loading').classList.add('hidden');
      document.getElementById('result-content').classList.remove('hidden');
    }

    // --- 자판 리셋 및 복구 ---
    function resetApp() {
      testIndex = 0;
      testScores = { 
        energy: 0, spiceNeeded: 0, maxSpicy: 2, oilyPref: 1, varietyNeeded: false,
        heavyNeeded: 0, texture: 'any', energyNeeded: 0, budgetSensitive: false,
        saltNeeded: 0, brothPref: 1, speedNeeded: 0, adventure: false, coolNeeded: 0, prizeNeeded: false
      };
      cravingFilters = { types: [], spicy: [], categories: [], prices: [], temps: [] };
      swipeIndex = 0;
      dislikedFoods = [];
      likedFoods = [];
      foodImageOverrides = {};
      recommendedFood = null;

      applySavedCustomImages();
      goToScreen('main');
    }

    // --- 단일 인덱스 파일 보존 다운로드 헬퍼 ---
    function downloadThisFile() {
      const htmlText = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
      const blob = new Blob([htmlText], { type: 'text/html;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    // 자바스크립트 글로벌 윈도우 스코프 함수 선언 바인딩 (컴파일 안정성 확보)
    window.startTest = startTest;
    window.startCraving = startCraving;
    window.startDislike = startDislike;
    window.nextAltImage = nextAltImage;
    window.applyCustomUrl = applyCustomUrl;
    window.applyResultCustomUrl = applyResultCustomUrl;
    window.swipeFood = swipeFood;
    window.calculateAndShowResult = calculateAndShowResult;
    window.resetApp = resetApp;
    window.downloadThisFile = downloadThisFile;
    window.goToScreen = goToScreen;

    // 초기 기동 감지 및 실행 트리거
    window.onload = function() {
      resetApp();
    };
  </script>

</body></html>
